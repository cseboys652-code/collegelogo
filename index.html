
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APEC College Login</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;

        /* 🌈 Tricolor background */
        background: linear-gradient(-45deg, #FF9933, #FFFFFF, #138808);
        background-size: 300% 300%;
        animation: moveBG 8s ease infinite;
    }

    @keyframes moveBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .box {
        width: 380px;
        padding: 30px;
        background: white;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .logo {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 20px;
        margin: 5px 0;
    }

    h2 {
        font-size: 16px;
        color: #444;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
    }

    input:focus {
        border-color: #138808;
        box-shadow: 0 0 8px #138808;
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(90deg, #FF9933, #138808);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .footer {
        margin-top: 10px;
        font-size: 12px;
        color: gray;
    }
</style>
</head>

<body>

<div class="box">

    <!-- ✅ YOUR UPLOADED LOGO -->
    <img src="logo.png" alt="College Logo" class="logo">

    <!-- COLLEGE NAME -->
    <h1>APEC COLLEGE OF ENGINEERING</h1>
    <h2>Login Portal</h2>

    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Designed for College Project 🚀
    </div>

</div>

</body>
</html>
